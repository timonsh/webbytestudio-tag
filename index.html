<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebByte Studio Tag</title>
    <link rel="stylesheet" href="studio-badge.css">
    <style>
        body {
            margin: 0;
            background: #fff;
            color: #241f18;
            font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .wrap {
            max-width: 760px;
            margin: 0 auto;
            padding: 3rem 1.25rem 5rem;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: .25rem;
        }

        p.note {
            color: #555;
            margin-top: 0;
        }

        code {
            background: #f2f2f4;
            padding: .1em .35em;
            border-radius: 5px;
            font-size: .9em;
        }
    </style>
</head>

<body>
    <div class="wrap">

        <aside class="studio-badge" aria-label="Erstellt von WebByte Studio">
            <div class="studio-badge__text">
                <p class="studio-badge__line"><span class="studio-badge__prompt">&#10095;</span> gebaut von <a
                        href="https://timonsh.dev" rel="noopener">WebByte&nbsp;Studio</a></p>
                <p class="studio-badge__meta">timon schroth &middot; frontend&nbsp;dev &middot; <a
                        href="https://timonsh.dev" rel="noopener">timonsh.dev</a></p>
            </div>
            <a class="studio-badge__avatar" href="https://timonsh.dev" rel="noopener" aria-label="timonsh.dev — Profil">
                <img src="timon-profile.webp" alt="Timon Schroth" width="144" height="144" loading="lazy">
            </a>
        </aside>

    </div>
</body>

</html>
